<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0f172a;color:white;height:100vh;display:flex;}
#authScreen{width:100%;display:flex;justify-content:center;align-items:center;}
.container{width:100%;max-width:420px;padding:20px;}
.card{background:#111827;padding:20px;border-radius:16px;display:flex;flex-direction:column;gap:12px;}
input{padding:12px;border-radius:12px;border:none;outline:none;}
button{padding:12px;border-radius:12px;border:none;background:#2563eb;color:white;cursor:pointer;}
#chatApp{display:none;width:100%;height:100vh;}
#usersList{width:30%;background:#111827;padding:15px;overflow-y:auto;}
.userItem{padding:10px;border-radius:10px;cursor:pointer;margin-bottom:6px;background:#1e293b;}
.userItem:hover{background:#2563eb;}
#chatArea{flex:1;display:flex;flex-direction:column;}
header{padding:15px;background:#111827;text-align:center;}
#chat{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;}
.message{padding:10px 14px;border-radius:14px;max-width:70%;background:#1e293b;}
.me{align-self:flex-end;background:#2563eb;}
footer{display:flex;padding:10px;background:#111827;gap:10px;}
</style>
</head>
<body>

<div id="authScreen">
<div class="container">
<div class="card">
<h3>Вход</h3>
<input id="loginUsername" placeholder="@username">
<input id="loginPassword" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>

<hr>

<h3>Регистрация</h3>
<input id="regName" placeholder="Имя">
<input id="regUsername" placeholder="@username">
<input id="regPassword" type="password" placeholder="Пароль">
<button onclick="register()">Создать аккаунт</button>
</div>
</div>
</div>

<div id="chatApp">
<div id="usersList"></div>
<div id="chatArea">
<header id="chatHeader">Выберите пользователя</header>
<div id="chat"></div>
<footer>
<input id="messageInput" placeholder="Сообщение...">
<button onclick="sendMessage()">➤</button>
</footer>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDo5ji0ABgf5lIwFCW5uJjx_aGt-u-MnHQ",
  authDomain: "forum-rp-project.firebaseapp.com",
  databaseURL: "https://forum-rp-project-default-rtdb.firebaseio.com",
  projectId: "forum-rp-project",
  storageBucket: "forum-rp-project.firebasestorage.app",
  messagingSenderId: "285944930982",
  appId: "1:285944930982:web:3a456ca8ea3f347e970a67"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let currentChatUser = null;

function getChatId(user1,user2){
return [user1,user2].sort().join("_");
}

window.register = async function(){
let name = regName.value.trim();
let username = regUsername.value.trim();
let password = regPassword.value;

if(!username.startsWith("@")) username="@"+username;

const snap = await get(child(ref(db),"users/"+username));
if(snap.exists()) return alert("Username занят");

await set(ref(db,"users/"+username),{name,password});
alert("Аккаунт создан");
}

window.login = async function(){
let username = loginUsername.value.trim();
let password = loginPassword.value;

if(!username.startsWith("@")) username="@"+username;

const snap = await get(child(ref(db),"users/"+username));
if(!snap.exists()) return alert("Аккаунт не найден");

const data = snap.val();
if(data.password!==password) return alert("Неверный пароль");

currentUser={username,name:data.name};

authScreen.style.display="none";
chatApp.style.display="flex";

loadUsers();
}

function loadUsers(){
const usersRef = ref(db,"users");

onValue(usersRef,(snapshot)=>{
usersList.innerHTML="";
snapshot.forEach(child=>{
if(child.key===currentUser.username) return;

const div=document.createElement("div");
div.className="userItem";
div.innerText=child.val().name+" ("+child.key+")";
div.onclick=()=>openChat(child.key,child.val().name);

usersList.appendChild(div);
});
});
}

function openChat(username,name){
currentChatUser=username;
chatHeader.innerText=name+" ("+username+")";
loadMessages();
}

function loadMessages(){
const chatId=getChatId(currentUser.username,currentChatUser);
const chatRef=ref(db,"privateChats/"+chatId);

onValue(chatRef,(snapshot)=>{
chat.innerHTML="";
snapshot.forEach(child=>{
const data=child.val();
const div=document.createElement("div");
div.className="message";
if(data.sender===currentUser.username) div.classList.add("me");
div.innerText=data.text;
chat.appendChild(div);
});
chat.scrollTop=chat.scrollHeight;
});
}

window.sendMessage=function(){
if(!currentChatUser) return alert("Выберите пользователя");
if(!messageInput.value.trim()) return;

const chatId=getChatId(currentUser.username,currentChatUser);

push(ref(db,"privateChats/"+chatId),{
sender:currentUser.username,
text:messageInput.value,
time:Date.now()
});

messageInput.value="";
}

</script>

</body>
</html>
