<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0f172a;
height:100vh;
display:flex;
flex-direction:column;
color:white;
}

header{
padding:16px;
background:#111827;
font-size:18px;
font-weight:600;
text-align:center;
}

#chat{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
display:flex;
gap:12px;
align-items:flex-end;
}

.avatar{
width:52px;
height:52px;
border-radius:50%;
object-fit:cover;
border:2px solid #1f2937;
}

.bubble{
background:#1e293b;
padding:12px 16px;
border-radius:18px;
max-width:70%;
word-wrap:break-word;
}

.name{
font-size:13px;
opacity:0.7;
margin-bottom:4px;
}

.my{
flex-direction:row-reverse;
}

.my .bubble{
background:#2563eb;
}

footer{
padding:12px;
background:#111827;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
outline:none;
font-size:15px;
}

button{
padding:10px 16px;
border:none;
border-radius:20px;
background:#2563eb;
color:white;
cursor:pointer;
}

.admin-panel{
padding:10px;
text-align:center;
background:#1f2937;
display:none;
}
</style>
</head>

<body>

<header>Friends Chat</header>

<div id="chat"></div>

<div class="admin-panel" id="adminPanel">
<button onclick="clearChat()">Очистить чат</button>
</div>

<footer>
<input id="messageInput" placeholder="Написать сообщение...">
<button onclick="sendMessage()">➤</button>
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDo5ji0ABgf5lIwFCW5uJjx_aGt-u-MnHQ",
  authDomain: "forum-rp-project.firebaseapp.com",
  databaseURL: "https://forum-rp-project-default-rtdb.firebaseio.com",
  projectId: "forum-rp-project",
  storageBucket: "forum-rp-project.firebasestorage.app",
  messagingSenderId: "285944930982",
  appId: "1:285944930982:web:3a456ca8ea3f347e970a67"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db,"messages");

let nickname = localStorage.getItem("nickname");
let role = localStorage.getItem("role");
let avatar = localStorage.getItem("avatar");

if(!nickname){
nickname = prompt("Введите ник:") || "Аноним";
localStorage.setItem("nickname", nickname);
}

if(!role){
let password = prompt("Введите пароль доступа:");

if(password === "Benjamin"){
role = "user";
avatar = "privacy-mask-icon-design-vector-260nw-1715757265.jpg";
}
else if(password === "Burmese"){
role = "admin";
avatar = "YetAnotherBot.jpg";
document.getElementById("adminPanel").style.display="block";
}
else{
alert("Неверный пароль");
location.reload();
}

localStorage.setItem("role", role);
localStorage.setItem("avatar", avatar);
}

if(role === "admin"){
document.getElementById("adminPanel").style.display="block";
}

window.sendMessage = function(){
const input = document.getElementById("messageInput");
if(!input.value.trim()) return;

push(chatRef,{
name:nickname,
text:input.value,
avatar:avatar,
role:role,
time:Date.now()
});

input.value="";
}

onValue(chatRef,(snapshot)=>{
const chat = document.getElementById("chat");
chat.innerHTML="";

snapshot.forEach(child=>{
const data = child.val();

const msg = document.createElement("div");
msg.className="message";

if(data.name === nickname){
msg.classList.add("my");
}

msg.innerHTML=`
<img class="avatar" src="${data.avatar}">
<div class="bubble">
<div class="name">${data.name}</div>
${data.text}
</div>
`;

chat.appendChild(msg);
});

chat.scrollTop = chat.scrollHeight;
});

window.clearChat = function(){
if(role === "admin"){
if(confirm("Очистить весь чат?")){
remove(chatRef);
}
}
}

</script>

</body>
</html>
