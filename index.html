<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostRoom</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f14;
  color:white;
}

.screen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input{
  padding:12px;
  margin:8px;
  border:none;
  border-radius:15px;
  width:250px;
  background:#23233a;
  color:white;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#6d5dfc;
  color:white;
  cursor:pointer;
}

.chat{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.message{
  background:#23233a;
  padding:10px;
  border-radius:15px;
  margin-bottom:10px;
  position:relative;
}

.message-header{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  margin-bottom:5px;
}

.avatar{
  width:25px;
  height:25px;
  border-radius:50%;
}

.controls{
  position:absolute;
  right:10px;
  top:10px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.controls span{
  margin-left:5px;
}

.input-area{
  display:flex;
  padding:10px;
  background:#171722;
}

.input-area input{
  flex:1;
}
</style>
</head>
<body>

<div class="screen" id="login">
  <h2>Введите пароль доступа 🔐</h2>
  <input type="password" id="password" placeholder="Пароль">
  <button onclick="enter()">Войти</button>
</div>

<div class="screen" id="nicknameScreen" style="display:none">
  <h2>Введите ник</h2>
  <input type="text" id="nickname" placeholder="Ваш ник">
  <button onclick="startChat()">Продолжить</button>
</div>

<div class="chat" id="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Сообщение...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let role = "user";
let avatar = "";
let username = "Аноним";

function enter(){
  const pass = document.getElementById("password").value;

  if(pass === "Benjamin"){
    role = "user";
    avatar = "privacy-mask-icon-design-vector-260nw-1715757265.jpg";
  }
  else if(pass === "Burmese"){
    role = "admin";
    avatar = "YetAnotherBot.jpg";
  }
  else{
    alert("Неверный пароль");
    return;
  }

  document.getElementById("login").style.display="none";
  document.getElementById("nicknameScreen").style.display="flex";
}

function startChat(){
  const nickInput = document.getElementById("nickname").value;
  if(nickInput.trim() !== ""){
    username = nickInput;
  }

  document.getElementById("nicknameScreen").style.display="none";
  document.getElementById("chat").style.display="flex";
}

function sendMessage(){
  const text = document.getElementById("messageInput").value;
  if(!text.trim()) return;

  const msgDiv = document.createElement("div");
  msgDiv.className = "message";

  msgDiv.innerHTML = `
    <div class="message-header">
      <img src="${avatar}" class="avatar">
      <strong>${username}</strong>
      ${role === "admin" ? "👑" : ""}
    </div>
    <div class="message-text">${text}</div>
    <div class="controls">
      <span onclick="editMessage(this)">✏️</span>
      <span onclick="deleteMessage(this)">🗑</span>
    </div>
  `;

  document.getElementById("messages").appendChild(msgDiv);
  document.getElementById("messageInput").value="";
}

function deleteMessage(el){
  const message = el.closest(".message");
  if(role === "admin"){
    message.remove();
  } else {
    message.remove();
  }
}

function editMessage(el){
  const message = el.closest(".message");
  const textDiv = message.querySelector(".message-text");
  const newText = prompt("Редактировать сообщение:", textDiv.innerText);
  if(newText !== null){
    textDiv.innerText = newText;
  }
}
</script>

</body>
</html>
