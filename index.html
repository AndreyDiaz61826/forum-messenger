<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostChat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:system-ui;background:#0f0f14;color:white}
.screen{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column}
input,textarea{
  padding:12px;
  margin:8px;
  border:none;
  border-radius:15px;
  width:260px;
  background:#23233a;
  color:white;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#6d5dfc;
  color:white;
  cursor:pointer;
}
.app{display:none;height:100vh}
.sidebar{width:30%;background:#171722;float:left;height:100%;overflow-y:auto}
.main{width:70%;float:left;height:100%;display:flex;flex-direction:column}
.messages{flex:1;padding:15px;overflow-y:auto}
.message{padding:10px 15px;margin-bottom:10px;border-radius:18px;max-width:60%}
.sent{background:#6d5dfc;margin-left:auto}
.received{background:#2a2a3d}
.input-area{display:flex;padding:10px;background:#171722}
.input-area input{flex:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen" id="login" style="display:flex">
  <h2>Вход по номеру 👻</h2>
  <input type="tel" id="phone" placeholder="+34 600 000 000">
  <div id="recaptcha"></div>
  <button onclick="sendCode()">Получить код</button>
</div>

<!-- VERIFY -->
<div class="screen" id="verify">
  <h2>Введите код</h2>
  <input type="text" id="code" placeholder="Код из SMS">
  <button onclick="verifyCode()">Подтвердить</button>
</div>

<!-- PROFILE SETUP -->
<div class="screen" id="profile">
  <h2>Создание профиля</h2>
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="username" placeholder="User Name">
  <textarea id="description" placeholder="Description"></textarea>
  <button onclick="saveProfile()">Сохранить</button>
</div>

<!-- MAIN APP -->
<div class="app" id="app">
  <div class="sidebar" id="chatList"></div>
  <div class="main">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Сообщение...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "ТВОЙ_AUTH_DOMAIN",
  projectId: "ТВОЙ_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha');

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="flex";
}

function sendCode(){
  const phone=document.getElementById("phone").value;
  auth.signInWithPhoneNumber(phone,window.recaptchaVerifier)
  .then(result=>{
    window.confirmationResult=result;
    showScreen("verify");
  });
}

function verifyCode(){
  const code=document.getElementById("code").value;
  confirmationResult.confirm(code)
  .then(async result=>{
    const userDoc=await db.collection("users").doc(result.user.uid).get();
    if(userDoc.exists){
      startApp();
    }else{
      showScreen("profile");
    }
  });
}

function saveProfile(){
  const user=auth.currentUser;
  db.collection("users").doc(user.uid).set({
    name:document.getElementById("name").value,
    username:document.getElementById("username").value,
    description:document.getElementById("description").value,
    phone:user.phoneNumber
  }).then(()=>startApp());
}

function startApp(){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById("app").style.display="block";
  loadChats();
}

function loadChats(){
  db.collection("chats").onSnapshot(snapshot=>{
    const list=document.getElementById("chatList");
    list.innerHTML="";
    snapshot.forEach(doc=>{
      const div=document.createElement("div");
      div.className="chat-item";
      div.innerText=doc.id;
      div.onclick=()=>openChat(doc.id);
      list.appendChild(div);
    });
  });
}

let currentChat=null;

function openChat(chatId){
  currentChat=chatId;
  db.collection("chats").doc(chatId)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snapshot=>{
    const box=document.getElementById("messages");
    box.innerHTML="";
    snapshot.forEach(doc=>{
      const data=doc.data();
      const div=document.createElement("div");
      div.className="message "+(data.uid===auth.currentUser.uid?"sent":"received");
      div.innerText=data.text;
      box.appendChild(div);
    });
  });
}

function sendMessage(){
  const text=document.getElementById("messageInput").value;
  if(!text||!currentChat)return;
  db.collection("chats").doc(currentChat)
  .collection("messages")
  .add({
    text:text,
    uid:auth.currentUser.uid,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById("messageInput").value="";
}
</script>

</body>
</html>
