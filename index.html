<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0f172a;color:white;height:100vh;display:flex;}

#authScreen{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:18px;
display:flex;
flex-direction:column;
gap:12px;
}

input{
padding:12px;
border-radius:12px;
border:none;
outline:none;
}

button{
padding:12px;
border-radius:12px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
}

#app{
display:none;
width:100%;
height:100vh;
}

#dialogs{
width:35%;
background:#111827;
padding:15px;
overflow-y:auto;
border-right:1px solid #1e293b;
}

.dialog{
padding:12px;
border-radius:14px;
margin-bottom:8px;
cursor:pointer;
background:#1e293b;
transition:0.2s;
}

.dialog:hover{
background:#2563eb;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:15px;
background:#111827;
text-align:center;
font-weight:600;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:16px;
background:#1e293b;
word-wrap:break-word;
}

.me{
align-self:flex-end;
background:#2563eb;
}

.msg img{
max-width:100%;
border-radius:12px;
margin-top:6px;
}

footer{
display:flex;
padding:10px;
background:#111827;
gap:8px;
align-items:center;
}

footer input[type="text"]{
flex:1;
}
</style>
</head>
<body>

<div id="authScreen">
<div class="container">
<div class="card">
<h3>Вход</h3>
<input id="loginUsername" placeholder="@username">
<input id="loginPassword" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>

<hr>

<h3>Регистрация</h3>
<input id="regName" placeholder="Имя">
<input id="regUsername" placeholder="@username">
<input id="regPassword" type="password" placeholder="Пароль">
<button onclick="register()">Создать аккаунт</button>
</div>
</div>
</div>

<div id="app">
<div id="dialogs"></div>

<div id="chatArea">
<header id="chatHeader">Выберите диалог</header>
<div id="messages"></div>

<footer>
<input type="file" id="imageInput" accept="image/*">
<input type="text" id="textInput" placeholder="Сообщение...">
<button onclick="sendMessage()">➤</button>
</footer>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDo5ji0ABgf5lIwFCW5uJjx_aGt-u-MnHQ",
  authDomain: "forum-rp-project.firebaseapp.com",
  databaseURL: "https://forum-rp-project-default-rtdb.firebaseio.com",
  projectId: "forum-rp-project",
  storageBucket: "forum-rp-project.firebasestorage.app",
  messagingSenderId: "285944930982",
  appId: "1:285944930982:web:3a456ca8ea3f347e970a67"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);
const storage = getStorage(appFirebase);

let currentUser=null;
let currentChat=null;

function chatId(a,b){
return [a,b].sort().join("_");
}

window.register=async function(){
let name=regName.value.trim();
let username=regUsername.value.trim();
let password=regPassword.value;

if(!username.startsWith("@")) username="@"+username;

const snap=await get(child(ref(db),"users/"+username));
if(snap.exists()) return alert("Username занят");

await set(ref(db,"users/"+username),{name,password});
alert("Аккаунт создан");
}

window.login=async function(){
let username=loginUsername.value.trim();
let password=loginPassword.value;

if(!username.startsWith("@")) username="@"+username;

const snap=await get(child(ref(db),"users/"+username));
if(!snap.exists()) return alert("Не найден");

if(snap.val().password!==password) return alert("Неверный пароль");

currentUser={username,name:snap.val().name};

authScreen.style.display="none";
app.style.display="flex";

loadDialogs();
}

function loadDialogs(){
onValue(ref(db,"users"),(snapshot)=>{
dialogs.innerHTML="";
snapshot.forEach(child=>{
if(child.key===currentUser.username) return;
const div=document.createElement("div");
div.className="dialog";
div.innerText=child.val().name+" ("+child.key+")";
div.onclick=()=>openChat(child.key,child.val().name);
dialogs.appendChild(div);
});
});
}

function openChat(username,name){
currentChat=username;
chatHeader.innerText=name;
loadMessages();
}

function loadMessages(){
const id=chatId(currentUser.username,currentChat);
onValue(ref(db,"privateChats/"+id),(snapshot)=>{
messages.innerHTML="";
snapshot.forEach(child=>{
const data=child.val();
const div=document.createElement("div");
div.className="msg";
if(data.sender===currentUser.username) div.classList.add("me");

if(data.image){
div.innerHTML=data.text?data.text+"<br>":"";
const img=document.createElement("img");
img.src=data.image;
div.appendChild(img);
}else{
div.innerText=data.text;
}

messages.appendChild(div);
});
messages.scrollTop=messages.scrollHeight;
});
}

window.sendMessage=async function(){
if(!currentChat) return alert("Выберите диалог");

let text=textInput.value.trim();
let file=imageInput.files[0];
let id=chatId(currentUser.username,currentChat);

let messageData={
sender:currentUser.username,
text:text||"",
time:Date.now()
};

if(file){
const storageRef=sRef(storage,"chatImages/"+Date.now()+"_"+file.name);
await uploadBytes(storageRef,file);
const url=await getDownloadURL(storageRef);
messageData.image=url;
}

if(!text && !file) return;

await push(ref(db,"privateChats/"+id),messageData);

textInput.value="";
imageInput.value="";
}

</script>
</body>
</html>
