<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Messenger TG Style</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0b0f1a;color:white;height:100vh;display:flex;justify-content:center;align-items:center;}
#authScreen,#app{width:100%;height:100vh;display:flex;}
.container{width:100%;max-width:420px;padding:20px;}
.card{background:#111827;padding:20px;border-radius:18px;display:flex;flex-direction:column;gap:12px;}
input, button, select{padding:12px;border-radius:12px;border:none;outline:none;font-size:15px;}
button{background:#2563eb;color:white;cursor:pointer;}
input[type="file"]{padding:6px;}
#app{display:none;flex-direction:row;}
#sidebar{width:35%;background:#161b22;padding:15px;overflow-y:auto;border-right:1px solid #21262d;display:flex;flex-direction:column;}
#searchBar{margin-bottom:12px;padding:8px;border-radius:12px;border:none;background:#0d1117;color:white;}
#dialogs{flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.dialog{display:flex;align-items:center;padding:10px;border-radius:12px;cursor:pointer;gap:10px;background:#21262d;transition:0.2s;}
.dialog:hover{background:#2563eb;}
.dialog img{width:40px;height:40px;border-radius:50%;object-fit:cover;}
#chatArea{flex:1;display:flex;flex-direction:column;}
header{padding:15px;background:#161b22;text-align:center;font-weight:600;}
#messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:75%;padding:10px 14px;border-radius:16px;background:#21262d;word-wrap:break-word;display:flex;flex-direction:column;gap:4px;}
.me{align-self:flex-end;background:#2563eb;}
.msg img{max-width:100%;border-radius:12px;margin-top:4px;}
footer{display:flex;padding:10px;background:#161b22;gap:8px;align-items:center;}
footer input[type="text"]{flex:1;}
.avatar-preview{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #2563eb;margin-bottom:8px;}
</style>
</head>
<body>

<div id="authScreen">
<div class="container">

<!-- Вход -->
<div class="card" id="loginCard">
<h3>Вход</h3>
<input id="loginUsername" placeholder="@username">
<input id="loginPassword" type="password" placeholder="Пароль">
<label><input type="checkbox" id="rememberMe"> Запомнить меня</label>
<button onclick="login()">Войти</button>
<hr>
<p>Нет аккаунта? <a href="#" onclick="showRegister()">Регистрация</a></p>
</div>

<!-- Регистрация -->
<div class="card" id="registerCard" style="display:none;">
<h3>Регистрация</h3>
<input id="regName" placeholder="Имя">
<input id="regUsername" placeholder="@username">
<input id="regPassword" type="password" placeholder="Пароль">
<label>Выберите аватарку:</label>
<input type="file" id="regAvatar" accept="image/*">
<div class="avatar-preview" id="avatarPreview"></div>
<button onclick="register()">Создать аккаунт</button>
<p>Есть аккаунт? <a href="#" onclick="showLogin()">Вход</a></p>
</div>

</div>
</div>

<!-- Основной чат -->
<div id="app">
<div id="sidebar">
<input type="text" id="searchBar" placeholder="Поиск по @username" oninput="searchUsers()">
<div id="dialogs"></div>
</div>

<div id="chatArea">
<header id="chatHeader">Все</header>
<div id="messages"></div>
<footer>
<input type="file" id="imageInput" accept="image/*">
<input type="text" id="textInput" placeholder="Сообщение...">
<button onclick="sendMessage()">➤</button>
</footer>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDo5ji0ABgf5lIwFCW5uJjx_aGt-u-MnHQ",
  authDomain: "forum-rp-project.firebaseapp.com",
  databaseURL: "https://forum-rp-project-default-rtdb.firebaseio.com",
  projectId: "forum-rp-project",
  storageBucket: "forum-rp-project.firebasestorage.app",
  messagingSenderId: "285944930982",
  appId: "1:285944930982:web:3a456ca8ea3f347e970a67"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);
const storage = getStorage(appFirebase);

let currentUser=null;
let currentChat="all"; 
let usersList = [];

// Переключение экранов
function showRegister(){ loginCard.style.display="none"; registerCard.style.display="flex"; }
function showLogin(){ registerCard.style.display="none"; loginCard.style.display="flex"; }

// Превью аватарки при регистрации
regAvatar.addEventListener("change",()=>{
  const file = regAvatar.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => avatarPreview.style.backgroundImage = `url(${e.target.result})`;
  reader.readAsDataURL(file);
});

function chatId(a,b){ return [a,b].sort().join("_"); }

// Проверяем сохранённого пользователя
const savedUser = localStorage.getItem("currentUser");
if(savedUser){
  currentUser = JSON.parse(savedUser);
  authScreen.style.display="none";
  app.style.display="flex";
  loadUsers();
  openChat("all","Все");
}

// Регистрация
window.register=async function(){
  let name=regName.value.trim();
  let username=regUsername.value.trim();
  let password=regPassword.value;
  if(!username.startsWith("@")) username="@"+username;
  if(!name||!username||!password) return alert("Заполните все поля");

  const snap=await get(child(ref(db),"users/"+username));
  if(snap.exists()) return alert("Username занят");

  let avatarUrl="";
  if(regAvatar.files[0]){
    const file = regAvatar.files[0];
    const storageRef = sRef(storage,"avatars/"+Date.now()+"_"+file.name);
    await uploadBytes(storageRef,file);
    avatarUrl = await getDownloadURL(storageRef);
  }

  await set(ref(db,"users/"+username),{name,password,avatar:avatarUrl});
  alert("Аккаунт создан");
  showLogin();
}

// Вход
window.login=async function(){
  let username=loginUsername.value.trim();
  let password=loginPassword.value;
  const remember=document.getElementById("rememberMe").checked;
  if(!username.startsWith("@")) username="@"+username;

  const snap = await get(child(ref(db),"users/"+username));
  if(!snap.exists()) return alert("Аккаунт не найден");
  if(snap.val().password!==password) return alert("Неверный пароль");

  currentUser={username,name:snap.val().name,avatar:snap.val().avatar};
  if(remember) localStorage.setItem("currentUser",JSON.stringify(currentUser));
  else localStorage.removeItem("currentUser");

  authScreen.style.display="none";
  app.style.display="flex";
  loadUsers();
  openChat("all","Все");
}

// Загрузка пользователей
async function loadUsers(){
  const snap = await get(ref(db,"users"));
  usersList=[];
  dialogs.innerHTML="";
  snap.forEach(child=>{
    if(child.key!==currentUser.username){
      usersList.push({username:child.key,name:child.val().name,avatar:child.val().avatar});
      addDialog(child.key,child.val().name,child.val().avatar);
    }
  });
}

// Добавление диалога
function addDialog(username,name,avatar){
  const div=document.createElement("div");
  div.className="dialog";
  div.innerHTML=`<img src="${avatar||'https://via.placeholder.com/40'}"> ${name} (${username})`;
  div.onclick=()=>openChat(username,name);
  dialogs.appendChild(div);
}

// Открытие чата
function openChat(username,name){
  currentChat=username;
  chatHeader.innerText=name;
  loadMessages();
}

// Загрузка сообщений
function loadMessages(){
  let messagesRef=currentChat==="all"?ref(db,"groupChat"):ref(db,"privateChats/"+chatId(currentUser.username,currentChat));
  onValue(messagesRef,(snapshot)=>{
    messages.innerHTML="";
    snapshot.forEach(child=>{
      const data = child.val();
      const div=document.createElement("div");
      div.className="msg";
      if(data.sender===currentUser.username) div.classList.add("me");
      if(data.image){ div.innerHTML=data.text?data.text+"<br>":""; const img=document.createElement("img"); img.src=data.image; div.appendChild(img);}
      else div.innerText=data.text;
      messages.appendChild(div);
    });
    messages.scrollTop=messages.scrollHeight;
  });
}

// Отправка сообщений
window.sendMessage=async function(){
  if(!currentChat) return alert("Выберите диалог");
  let text=textInput.value.trim();
  let file=imageInput.files[0];
  let messageData={sender:currentUser.username,text:text||"",time:Date.now()};
  if(file){
    const storageRef = sRef(storage,"chatImages/"+Date.now()+"_"+file.name);
    await uploadBytes(storageRef,file);
    const url = await getDownloadURL(storageRef);
    messageData.image=url;
  }
  if(!text && !file) return;
  let refToPush = currentChat==="all"?ref(db,"groupChat"):ref(db,"privateChats/"+chatId(currentUser.username,currentChat));
  await push(refToPush,messageData);
  textInput.value=""; imageInput.value="";
}

// Поиск
window.searchUsers=function(){
  const query=searchBar.value.toLowerCase();
  dialogs.innerHTML="";
  usersList.filter(u=>u.username.toLowerCase().includes(query)||u.name.toLowerCase().includes(query))
           .forEach(u=>addDialog(u.username,u.name,u.avatar));
}
</script>
</body>
</html>
