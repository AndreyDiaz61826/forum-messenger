<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostChat</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #0f0f14;
  color: white;
}

.sidebar {
  width: 30%;
  background: #171722;
  border-right: 1px solid #26263a;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #26263a;
}

.sidebar-header img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

.chat-list {
  overflow-y: auto;
}

.chat-item {
  padding: 15px;
  cursor: pointer;
  border-bottom: 1px solid #202030;
  transition: 0.2s;
}

.chat-item:hover {
  background: #23233a;
}

.main {
  width: 70%;
  display: flex;
  flex-direction: column;
}

.main-header {
  padding: 15px;
  border-bottom: 1px solid #26263a;
  background: #171722;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  margin-bottom: 10px;
  padding: 10px 15px;
  border-radius: 18px;
  max-width: 60%;
}

.sent {
  background: #6d5dfc;
  align-self: flex-end;
}

.received {
  background: #2a2a3d;
  align-self: flex-start;
}

.input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #26263a;
  background: #171722;
}

.input-area input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: #23233a;
  color: white;
}

.input-area button {
  margin-left: 10px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #6d5dfc;
  color: white;
  cursor: pointer;
}

@media (max-width: 768px) {
  .sidebar {
    display: none;
  }
  .main {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="sidebar-header">
    <img src="logo.png" alt="Logo">
    <h3>GhostChat</h3>
  </div>
  <div class="chat-list">
    <div class="chat-item">Дмитрий</div>
    <div class="chat-item">FBI RP</div>
    <div class="chat-item">Arizona Team</div>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <h3>Дмитрий</h3>
  </div>

  <div class="messages" id="messages">
    <div class="message received">Привет 👋</div>
    <div class="message sent">Это почти Telegram, но наш 😎</div>
  </div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Написать сообщение...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
function sendMessage() {
  const input = document.getElementById("messageInput");
  const messages = document.getElementById("messages");

  if (input.value.trim() !== "") {
    const msg = document.createElement("div");
    msg.className = "message sent";
    msg.innerText = input.value;
    messages.appendChild(msg);
    input.value = "";
    messages.scrollTop = messages.scrollHeight;
  }
}
</script>

</body>
</html>
